# Build Docker image and push to GitHub Container Registry (GHCR) (tag-driven)
name: build-and-push-ghcr-image

on:
  # Run only when a git tag like "v2.2.1" or "1.0.0.1" is pushed
  push:
    tags:
      - 'v*'
      - '[0-9]*' # Matches purely numeric tags like 1.0.0.1
    branches:
      - omop-db-image
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: false
        default: "omop-db-image"
      version_tag:
        description: "Custom Image Tag (e.g., 1.0.0.1) - Leave blank to use defaults"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  # GitHub requires repository names to be lowercase for packages.
  # metadata-action handles this automatically when combining REGISTRY and github.repository.
  IMAGE_NAME: ${{ github.repository_owner }}/omop-etl-postgresdb

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          lfs: true

      - name: Fetch Git LFS files
        run: git lfs pull

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 1. Custom tag explicitly typed during manual dispatch
            type=raw,value=${{ github.event.inputs.version_tag }},enable=${{ github.event.inputs.version_tag != '' }}

            # 2. Strict Git tag handling (v1.2.3 or 1.0.0.1)
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

            # 3. Add latest tag ONLY if it's a Git tag push
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

            # 4. Fallback 'edge' tag if manual dispatch is run without an explicit version_tag
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag == '' }}
            
            type=raw,value=1.0.0-${{ github.sha }},enable=${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Buildx v6 uses provenance tracking by default; inline mode cleans up workflow footprints
          provenance: true
          secrets: |
            "OHDSI_ETL_POSTGRES_DB_PASSWORD=postgres_pass"
          build-args: |
            PASSWORD_METHOD=default
            GIT_BRANCH=${{ github.event.inputs.branch || github.ref_name }}
            GIT_COMMIT_ID_ABBREV=${{ github.sha }}

      - name: Log generated Docker image tags
        run: |
          echo "Generated tags:"
          echo "${{ steps.meta.outputs.tags }}"

  release:
    needs: docker
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Pre-release ${{ github.ref_name }}"
          prerelease: true
          generate_release_notes: true
          body: |
            ## 🐳 Container Registry Info
            The OMOP DB image for this pre-release has been built and pushed to GHCR.
            
            ```bash
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}